name: Deploy

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]"

      - name: Run tests
        run: PYTHONPATH=. pytest -q

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust deploy host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_BRANCH: main
          DEPLOY_OPTIONAL_SERVICES: ${{ vars.DEPLOY_OPTIONAL_SERVICES || 'auto' }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd /srv/englishbot/app && \
             git fetch origin ${DEPLOY_BRANCH} && \
             git checkout ${DEPLOY_BRANCH} && \
             git reset --hard origin/${DEPLOY_BRANCH} && \
             DEPLOY_BRANCH=${DEPLOY_BRANCH} DEPLOY_OPTIONAL_SERVICES=${DEPLOY_OPTIONAL_SERVICES} bash scripts/deploy-docker-app.sh"

      - name: Read deployed release metadata
        id: release_meta
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cat /srv/englishbot/shared/deploy/current-release.env" > /tmp/current-release.env
          cat /tmp/current-release.env
          . /tmp/current-release.env
          echo "deploy_tag=${ENGLISHBOT_DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${ENGLISHBOT_BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${ENGLISHBOT_BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Tag successful deploy
        env:
          DEPLOY_TAG: ${{ steps.release_meta.outputs.deploy_tag }}
          BUILD_VERSION: ${{ steps.release_meta.outputs.build_version }}
          BUILD_NUMBER: ${{ steps.release_meta.outputs.build_number }}
        run: |
          if git rev-parse -q --verify "refs/tags/${DEPLOY_TAG}" >/dev/null; then
            echo "Tag ${DEPLOY_TAG} already exists locally."
            exit 0
          fi
          if git ls-remote --tags origin "refs/tags/${DEPLOY_TAG}" | grep -q "${DEPLOY_TAG}$"; then
            echo "Tag ${DEPLOY_TAG} already exists on origin."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${DEPLOY_TAG}" -m "Successful deploy ${BUILD_VERSION} build ${BUILD_NUMBER}"
          git push origin "${DEPLOY_TAG}"
